<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Public Chat (Yjs)</title>
    <style>
        :root {
            --bg-color: #121212;
            --chat-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent: #bb86fc;
            --accent-hover: #9c4dcc;
            --border: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            max-height: 800px;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        @media (min-width: 600px) {
            .chat-container {
                height: 90vh;
                border-radius: 12px;
                overflow: hidden;
            }
        }

        .chat-header {
            padding: 15px 20px;
            background-color: var(--chat-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 { font-size: 1.2rem; font-weight: 600; }

        .status {
            font-size: 0.8rem;
            color: #ffb300; /* Default connecting color */
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: currentColor;
            border-radius: 50%;
        }
        
        .status.connected { color: #03dac6; }
        .status.connected .status-dot { animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(3, 218, 198, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 5px rgba(3, 218, 198, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(3, 218, 198, 0); }
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message-item {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .message-content {
            background-color: #2c2c2c;
            padding: 8px 12px;
            border-radius: 8px;
            border-top-left-radius: 0;
            width: fit-content;
            max-width: 90%;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .message-content .author {
            color: var(--accent);
            font-weight: bold;
            margin-right: 5px;
        }

        .input-area {
            padding: 15px;
            background-color: var(--chat-bg);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-row { display: flex; gap: 10px; }

        input {
            background-color: #2c2c2c;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }
        #nameInput { width: 30%; min-width: 100px; }
        #msgInput { flex: 1; }

        button {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover { background-color: var(--accent-hover); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--chat-bg); }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #777; }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2>P2P Global Chat 🌐</h2>
            <div class="status" id="statusIndicator">
                <div class="status-dot"></div> <span id="statusText">Connecting...</span>
            </div>
        </div>
        
        <div class="messages" id="messagesDiv">
            <!-- Pesan akan dirender di sini -->
        </div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" id="nameInput" placeholder="Nama..." maxlength="20">
                <input type="text" id="msgInput" placeholder="Ketik pesan (dukung emoji 🚀)..." autocomplete="off">
                <button id="sendBtn">Kirim</button>
            </div>
        </div>
    </div>

    <!-- Menggunakan ES Modules untuk memuat Yjs -->
    <script type="module">
        // Import Yjs dan Provider dari CDN esm.sh
        import * as Y from 'https://esm.sh/yjs@13.6.14';
        import { WebsocketProvider } from 'https://esm.sh/y-websocket@2.0.4';
        import { WebrtcProvider } from 'https://esm.sh/y-webrtc@13.0.2';

        // 1. Inisialisasi Dokumen Bersama (Shared Document)
        const ydoc = new Y.Doc();
        
        // Nama ruangan (channel). Ganti string ini untuk membuat room terpisah.
        const roomName = 'github-pages-chat-room-2026-v2';

        // 2. Hubungkan ke Relay Publik menggunakan WebSocket (Prioritas Utama - Sangat Cepat)
        const wsProvider = new WebsocketProvider('wss://demos.yjs.dev/ws', roomName, ydoc);
        
        // 3. Fallback WebRTC: Jika WebSocket gagal, ini akan menghubungkan browser secara P2P murni
        const webrtcProvider = new WebrtcProvider(roomName, ydoc);

        // 4. Buat struktur data Array yang akan disinkronisasi
        const yMessages = ydoc.getArray('chat-messages');

        // Referensi elemen DOM
        const messagesDiv = document.getElementById('messagesDiv');
        const nameInput = document.getElementById('nameInput');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');

        // Update indikator koneksi
        wsProvider.on('status', event => {
            if (event.status === 'connected') {
                statusIndicator.classList.add('connected');
                statusText.innerText = 'Connected (Relay + P2P)';
            } else {
                statusIndicator.classList.remove('connected');
                statusText.innerText = 'Connecting...';
            }
        });

        // Fungsi Render Pesan
        function renderMessages() {
            messagesDiv.innerHTML = '';
            
            // Ambil array dari Yjs, batasi hanya 200 pesan terakhir agar DOM tidak berat
            const messages = yMessages.toArray().slice(-200);

            messages.forEach(msg => {
                const date = new Date(msg.timestamp);
                const timeString = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                
                const msgEl = document.createElement('div');
                msgEl.className = 'message-item';
                
                // Sanitasi sederhana mencegah XSS
                const safeName = (msg.name || 'Anon').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const safeText = (msg.text || '').replace(/</g, "&lt;").replace(/>/g, "&gt;");

                msgEl.innerHTML = `
                    <div class="message-meta">[${timeString}]</div>
                    <div class="message-content">
                        <span class="author">${safeName}:</span>
                        <span class="text">${safeText}</span>
                    </div>
                `;
                messagesDiv.appendChild(msgEl);
            });

            // Auto-scroll ke bawah
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 5. Listen perubahan data. Setiap ada yang kirim pesan, ini akan terpicu otomatis
        yMessages.observe(() => {
            renderMessages();
        });

        // 6. Fungsi Kirim Pesan
        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;

            const name = nameInput.value.trim() || 'Anon';
            
            // Push ke shared array. Yjs akan otomatis broadcast ke semua user.
            yMessages.push([{
                id: crypto.randomUUID(), // ID unik
                name: name,
                text: text,
                timestamp: Date.now()
            }]);

            msgInput.value = '';
            msgInput.focus();
        }

        // Event Listeners UI
        sendBtn.addEventListener('click', sendMessage);
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Simpan/Muat nama dari localStorage
        const savedName = localStorage.getItem('chatName');
        if (savedName) nameInput.value = savedName;
        
        nameInput.addEventListener('change', (e) => {
            localStorage.setItem('chatName', e.target.value);
        });

        // Initial render jika sudah ada pesan di memori relay
        renderMessages();

    </script>
</body>
</html>
