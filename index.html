<!DOCTYPE html>
<html>
<head>
  <title>Chat Public Pure GitHub</title>
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gun/lib/webrtc.js"></script> <!-- optional -->
  <style>
    #messages { height: 400px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
  </style>
</head>
<body>
  <h1>Chat Public (Gun.js Decentralized)</h1>
  <div id="messages"></div>
  <input id="nick" placeholder="Nama kamu" value="Anon">
  <input id="text" placeholder="Ketik pesan...">
  <button onclick="send()">Kirim</button>

  <script>
    const gun = Gun({
      peers: ['https://gun-manhattan.herokuapp.com/gun'] // relay publik gratis
    });
    const chat = gun.get('public-chat-room');

    chat.map().on((data, key) => {
      const div = document.createElement('div');
      div.textContent = `${data.nick}: ${data.text}`;
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView();
    });

    function send() {
      const nick = document.getElementById('nick').value || 'Anon';
      const text = document.getElementById('text').value;
      if (text) {
        chat.set({ nick, text, time: Date.now() });
        document.getElementById('text').value = '';
      }
    }

    document.getElementById('text').addEventListener('keypress', e => {
      if (e.key === 'Enter') send();
    });
  </script>
</body>
</html>
